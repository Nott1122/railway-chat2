<!DOCTYPE html>
<html>
<head>
  <meta name="viewport" content="width=device-width,initial-scale=1">
  <title>Chat Teste</title>
  <style>body{font-family:sans-serif;margin:0;display:flex;flex-direction:column;height:100vh}ul{flex:1;overflow:auto;padding:10px;list-style:none}li{padding:5px}form{display:flex}input{flex:1;padding:10px}button{padding:10px}</style>
</head>
<body>
  <ul id="messages"></ul>
  <form id="form"><input id="input" autocomplete="off" placeholder="digite..."/><button>Enviar</button></form>
<script src="/socket.io/socket.io.js"></script>
<script>
  const socket = io();
  const form = document.getElementById('form');
  const input = document.getElementById('input');
  const messages = document.getElementById('messages');
  form.addEventListener('submit', e => { e.preventDefault(); if(input.value){ socket.emit('chat message', input.value); input.value=''; } });
  socket.on('chat message', msg => { const li=document.createElement('li'); li.textContent=msg; messages.appendChild(li); });
</script>
</body>
</html>
