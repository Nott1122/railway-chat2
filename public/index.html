<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Railway Chat</title>
<script src="https://cdn.socket.io/4.7.5/socket.io.min.js"></script>
<style>
  :root { --bg:#0f172a; --card:#1e293b; --accent:#38bdf8; --text:#e2e8f0; }
  *{box-sizing:border-box} body{margin:0;font-family:system-ui,-apple-system,Segoe UI,Roboto;background:var(--bg);color:var(--text);height:100vh;display:flex;flex-direction:column}
  .hidden{display:none!important}
  .auth{max-width:360px;margin:auto;padding:24px;background:var(--card);border-radius:16px;box-shadow:0 10px 30px #0005}
  input,button{width:100%;padding:12px;margin:8px 0;border-radius:10px;border:1px solid #334155;background:#0f172a;color:var(--text);font-size:16px}
  button{background:var(--accent);color:#001; font-weight:600; cursor:pointer; border:none}
  button:disabled{opacity:.6}
  .profile img{width:80px;height:80px;border-radius:50%;object-fit:cover;background:#334155;margin:auto;display:block}
  .app{flex:1;display:flex;flex-direction:column;max-width:1200px;width:100%;margin:0 auto}
  header{padding:12px 16px;background:var(--card);display:flex;align-items:center;gap:12px}
  header img{width:36px;height:36px;border-radius:50%}
  .main{flex:1;display:flex;min-height:0}
  .sidebar{width:280px;background:#0b1220;border-right:1px solid #1e293b;padding:12px;overflow-y:auto}
  .sidebar h3{margin:8px 0 12px;font-size:14px;opacity:.8}
  .user{display:flex;align-items:center;gap:8px;padding:6px;border-radius:8px}
  .user img{width:28px;height:28px;border-radius:50%;object-fit:cover;background:#334155}
  .chat{flex:1;display:flex;flex-direction:column;min-width:0}
  .messages{flex:1;overflow-y:auto;padding:16px;display:flex;flex-direction:column;gap:12px}
  .msg{display:flex;gap:10px;align-items:flex-start}
  .msg img{width:36px;height:36px;border-radius:50%;object-fit:cover;background:#334155;flex-shrink:0}
  .bubble{background:var(--card);padding:10px 12px;border-radius:12px;max-width:75%}
  .meta{font-size:12px;opacity:.7;margin-bottom:4px}
  .input{display:flex;gap:8px;padding:12px;background:var(--card);border-top:1px solid #1e293b}
  .input input{flex:1;margin:0}
  .input button{width:auto;padding:0 18px}
  @media(max-width:768px){.sidebar{position:fixed;left:-280px;top:0;bottom:0;z-index:10;transition:.3s}.sidebar.open{left:0;box-shadow:0 0 30px #0008}.menu{display:block!important}}
  .menu{display:none;background:none;border:none;color:var(--text);font-size:24px;padding:0;width:auto}
</style>
</head>
<body>
<div id="auth" class="auth">
  <h2>Entrar no Chat</h2>
  <input id="email" type="email" placeholder="seu@email.com" autocomplete="email">
  <input id="password" type="password" placeholder="senha" autocomplete="current-password">
  <button id="loginBtn">Entrar</button>
  <button id="registerBtn" style="background:#1e293b;color:var(--text);border:1px solid #334155">Criar conta</button>
  <p id="authError" style="color:#f87171;font-size:14px"></p>
</div>

<div id="profile" class="auth hidden profile">
  <h2>Complete seu perfil</h2>
  <img id="preview" src="">
  <input id="nick" placeholder="Seu nick">
  <input id="avatar" type="file" accept="image/*">
  <button id="saveProfile">Salvar e entrar</button>
</div>

<div id="app" class="app hidden">
  <header>
    <button class="menu" id="toggleSidebar">☰</button>
    <img id="myAvatar" src="">
    <div>
      <div id="myNick" style="font-weight:600"></div>
      <div style="font-size:12px;opacity:.7">online</div>
    </div>
  </header>
  <div class="main">
    <aside class="sidebar" id="sidebar">
      <h3>ONLINE (<span id="onlineCount">0</span>)</h3>
      <div id="onlineList"></div>
    </aside>
    <section class="chat">
      <div id="messages" class="messages"></div>
      <div class="input">
        <input id="msgInput" placeholder="Digite uma mensagem..." autocomplete="off">
        <button id="sendBtn">Enviar</button>
      </div>
    </section>
  </div>
</div>

<script src="app.js"></script>
</body>
</html>
